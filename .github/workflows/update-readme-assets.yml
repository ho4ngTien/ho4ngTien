name: Update README assets

on:
  schedule:
    - cron: '0 1 * * *' # 01:00 UTC daily, after snake workflow
  workflow_dispatch: {}

jobs:
  update-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Fix line endings
        run: sed -i 's/\r//' .github/scripts/update-assets.sh
        shell: bash

      - name: Run asset updater script
        run: bash .github/scripts/update-assets.sh
        shell: bash
